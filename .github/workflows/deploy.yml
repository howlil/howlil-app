name: Build and Update GitOps

on:
  push:
    branches:
      - main

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    env:
      REGISTRY: registry.howlil.my.id
      IMAGE_NAME: howlil/howlil-app
      IMAGE_TAG: ${{ github.sha }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to howlil registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          build-args: |
            ASTRO_DB_REMOTE_URL=${{ secrets.ASTRO_DB_REMOTE_URL }}
            ASTRO_DB_APP_TOKEN=${{ secrets.ASTRO_DB_APP_TOKEN }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}

      - name: Configure kubectl
        env:
          KUBECONFIG_CONTENT: ${{ secrets.KUBECONFIG }}
        run: |
          mkdir -p "$HOME/.kube"
          echo "$KUBECONFIG_CONTENT" > "$HOME/.kube/config"
          chmod 600 "$HOME/.kube/config"

      - name: Ensure K8s secrets exist
        env:
          NAMESPACE: portofolio
          REGISTRY_USERNAME: ${{ secrets.REGISTRY_USERNAME }}
          REGISTRY_PASSWORD: ${{ secrets.REGISTRY_PASSWORD }}
          ASTRO_DB_REMOTE_URL: ${{ secrets.ASTRO_DB_REMOTE_URL }}
          ASTRO_DB_APP_TOKEN: ${{ secrets.ASTRO_DB_APP_TOKEN }}
        run: |
          set -e

          echo "Using namespace: $NAMESPACE"

          # Ensure namespace exists
          if ! kubectl get namespace "$NAMESPACE" >/dev/null 2>&1; then
            echo "Namespace $NAMESPACE does not exist. Creating..."
            kubectl create namespace "$NAMESPACE"
          else
            echo "Namespace $NAMESPACE already exists"
          fi

          # Secret for private registry
          if ! kubectl get secret howlil-registry-secret -n "$NAMESPACE" >/dev/null 2>&1; then
            echo "Creating secret howlil-registry-secret in namespace $NAMESPACE"
            kubectl create secret docker-registry howlil-registry-secret \
              --docker-server=${REGISTRY} \
              --docker-username="${REGISTRY_USERNAME}" \
              --docker-password="${REGISTRY_PASSWORD}" \
              -n "$NAMESPACE"
          else
            echo "Secret howlil-registry-secret already exists in $NAMESPACE"
          fi

          # Secret for Astro DB
          if ! kubectl get secret howlil-db-secret -n "$NAMESPACE" >/dev/null 2>&1; then
            echo "Creating secret howlil-db-secret in namespace $NAMESPACE"
            kubectl create secret generic howlil-db-secret \
              --from-literal=ASTRO_DB_REMOTE_URL="${ASTRO_DB_REMOTE_URL}" \
              --from-literal=ASTRO_DB_APP_TOKEN="${ASTRO_DB_APP_TOKEN}" \
              -n "$NAMESPACE"
          else
            echo "Secret howlil-db-secret already exists in $NAMESPACE"
          fi

      - name: Update Kubernetes manifest image tag
        run: |
          FILE_PATH=manifest.yml
          sed -i "s|image: ${REGISTRY}/${IMAGE_NAME}:.*|image: ${REGISTRY}/${IMAGE_NAME}:${IMAGE_TAG}|" "$FILE_PATH"
          echo "Updated image tag in $FILE_PATH to ${IMAGE_TAG}"

      - name: Commit and push manifest changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add manifest.yml
          git commit -m "Update howlil-app image to ${IMAGE_TAG}" || echo "No changes to commit"
          git push
